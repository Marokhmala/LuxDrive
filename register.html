<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account — LuxeDrive</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .auth-error {
      background: rgba(220, 53, 69, 0.1);
      border: 1px solid rgba(220, 53, 69, 0.3);
      color: #dc3545;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 0.875rem;
      margin-bottom: 16px;
      display: none;
      animation: fadeIn 0.2s ease;
    }

    .auth-success {
      background: rgba(40, 167, 69, 0.1);
      border: 1px solid rgba(40, 167, 69, 0.3);
      color: #28a745;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 0.875rem;
      margin-bottom: 16px;
      display: none;
      animation: fadeIn 0.2s ease;
    }

    .auth-error.visible,
    .auth-success.visible {
      display: block;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(-4px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .btn-loading {
      position: relative;
      pointer-events: none;
      opacity: 0.8;
    }

    .btn-loading::after {
      content: '';
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255, 255, 255, 0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin {
      to {
        transform: translateY(-50%) rotate(360deg);
      }
    }

    .form-input.input-error {
      border-color: #dc3545 !important;
      box-shadow: 0 0 0 3px rgba(220, 53, 69, 0.15);
    }
  </style>
</head>

<body data-page="register">

  <!-- NAVBAR -->
  <nav class="navbar scrolled">
    <div class="container">
      <a href="index.html" class="navbar-brand">
        <div class="brand-icon">
          <img src="logo/LuxDrive-logo.png" />
        </div>
      </a>
      <div class="navbar-nav">
        <a href="index.html">Home</a>
        <a href="cars.html">Cars</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
      </div>
      <div class="navbar-actions">
        <a href="login.html" class="btn btn-ghost btn-sm">Sign In</a>
      </div>
      <div class="navbar-toggle" aria-label="Menu">
        <span></span>
        <span></span>
        <span></span>
      </div>
    </div>
  </nav>

  <!-- SIDEBAR -->
  <div class="sidebar" id="sidebar">
    <a href="index.html">Home</a>
    <a href="cars.html">Cars</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
  </div>

  <div class="overlay" id="overlay"></div>


  <!-- AUTH -->
  <section class="auth-section">
    <div class="auth-container">
      <div class="auth-card">
        <div class="navbar-brand">
          <a href="index.html" class="navbar-brand">
            <div class="brand-icon">
              <img src="logo/LuxDrive-logo.png" />
            </div>
          </a>
          <h1>Create Account</h1>
          <p>Join LuxeDrive and start your luxury journey</p>
        </div>

        <div id="auth-error" class="auth-error" role="alert"></div>
        <div id="auth-success" class="auth-success" role="status"></div>

        <form id="register-form" novalidate>
          <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
            <div class="form-group">
              <label class="form-label" for="reg-firstname">First Name</label>
              <input type="text" class="form-input" id="reg-firstname" placeholder="John" required>
            </div>
            <div class="form-group">
              <label class="form-label" for="reg-lastname">Last Name</label>
              <input type="text" class="form-input" id="reg-lastname" placeholder="Doe" required>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label" for="reg-email">Email Address</label>
            <input type="email" class="form-input" id="reg-email" placeholder="john@example.com" required
              autocomplete="email">
          </div>
          <div class="form-group">
            <label class="form-label" for="reg-phone">Phone Number</label>
            <input type="tel" class="form-input" id="reg-phone" placeholder="+1 (555) 123-4567" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="reg-password">Password</label>
            <input type="password" class="form-input" id="reg-password" placeholder="Min 6 characters" required
              autocomplete="new-password">
          </div>
          <label class="checkbox-item" style="margin-bottom:24px; font-size:0.85rem">
            <input type="checkbox" id="reg-terms" required><span class="checkmark"></span> I agree to the Terms &
            Privacy Policy
          </label>
          <button type="submit" class="btn btn-primary btn-block btn-lg" id="register-btn">Create Account</button>
        </form>

        <div class="auth-footer">
          Already have an account? <a href="login.html">Sign in</a>
        </div>
      </div>
    </div>
  </section>

  <script src="js/auth.js"></script>
  <script>
    const API_BASE = 'https://rentcar.stepprojects.ge/api';

    /* ---------- UI helpers ---------- */
    function showError(msg) {
      const el = document.getElementById('auth-error');
      document.getElementById('auth-success').classList.remove('visible');
      el.textContent = msg;
      el.classList.add('visible');
      el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function showSuccess(msg) {
      const el = document.getElementById('auth-success');
      document.getElementById('auth-error').classList.remove('visible');
      el.textContent = msg;
      el.classList.add('visible');
    }

    function clearMessages() {
      document.getElementById('auth-error').classList.remove('visible');
      document.getElementById('auth-success').classList.remove('visible');
    }

    function setLoading(loading) {
      const btn = document.getElementById('register-btn');
      if (loading) {
        btn.classList.add('btn-loading');
        btn.textContent = 'Creating account…';
      } else {
        btn.classList.remove('btn-loading');
        btn.textContent = 'Create Account';
      }
    }

    function markError(id) {
      document.getElementById(id).classList.add('input-error');
    }

    function clearInputErrors() {
      document.querySelectorAll('.form-input.input-error')
        .forEach(el => el.classList.remove('input-error'));
    }

    /* ---------- Register API ---------- */
    async function registerUser({ firstName, lastName, email, phoneNumber, password }) {
      const response = await fetch(`${API_BASE}/Users/register`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'accept': '*/*'
        },
        body: JSON.stringify({
          phoneNumber,
          password,
          email,
          firstName,
          lastName,
          role: "User"          // default role
        })
      });

      let data;
      try { data = await response.json(); }
      catch { data = null; }

      if (!response.ok) {
        // Surface validation errors from the API
        const msg = data?.message
          || data?.title
          || (data?.errors ? Object.values(data.errors).flat().join(' ') : null)
          || `Registration failed (${response.status})`;
        throw new Error(msg);
      }

      return data;
    }

    /* ---------- Form submit ---------- */
    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      clearMessages();
      clearInputErrors();

      const firstName = document.getElementById('reg-firstname').value.trim();
      const lastName = document.getElementById('reg-lastname').value.trim();
      const email = document.getElementById('reg-email').value.trim();
      const phoneNumber = document.getElementById('reg-phone').value.trim();
      const password = document.getElementById('reg-password').value;
      const terms = document.getElementById('reg-terms').checked;

      // Client-side validation
      if (!firstName) { markError('reg-firstname'); showError('Please enter your first name.'); return; }
      if (!lastName) { markError('reg-lastname'); showError('Please enter your last name.'); return; }
      if (!email) { markError('reg-email'); showError('Please enter your email address.'); return; }
      if (!phoneNumber) { markError('reg-phone'); showError('Please enter your phone number.'); return; }
      if (password.length < 6) { markError('reg-password'); showError('Password must be at least 6 characters.'); return; }
      if (!terms) { showError('Please accept the Terms & Privacy Policy to continue.'); return; }

      setLoading(true);

      try {
        await registerUser({ firstName, lastName, email, phoneNumber, password });

        showSuccess('Account created! Redirecting to sign in…');

        setTimeout(() => {
          window.location.href = `login.html?phone=${encodeURIComponent(phoneNumber)}`;
        }, 1200);

      } catch (err) {
        showError(err.message || 'Something went wrong. Please try again.');
      } finally {
        setLoading(false);
      }
    });

    // Clear error highlight on input
    ['reg-firstname', 'reg-lastname', 'reg-email', 'reg-phone', 'reg-password'].forEach(id => {
      document.getElementById(id).addEventListener('input', () => {
        document.getElementById(id).classList.remove('input-error');
        clearMessages();
      });
    });

    /* ---------- Pre-fill email from redirect ---------- */
    const params = new URLSearchParams(window.location.search);
    if (params.get('email')) {
      document.getElementById('reg-email').value = params.get('email');
    }
  </script>
  <script src="js/chatbot.js"></script>
</body>

</html>
